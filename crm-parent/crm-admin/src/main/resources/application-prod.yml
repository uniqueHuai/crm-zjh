# ============================================================================
# CRM 系统 - 生产环境配置
# ============================================================================

spring:
  datasource:
    url: jdbc:postgresql://prod-db:5432/crm_db?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&stringtype=unspecified
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD}
      database: ${REDIS_DB:0}

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl

logging:
  level:
    com.crm: info
