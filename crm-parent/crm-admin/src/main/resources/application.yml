# ============================================================================
# CRM 系统 - 主配置
# ============================================================================

server:
  port: 8080
  servlet:
    context-path: /api/v1
  undertow:
    threads:
      io: 4
      worker: 32
    buffer-size: 1024
    direct-buffers: true

spring:
  application:
    name: crm

  profiles:
    active: dev

  # 数据源
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/crm-db?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&stringtype=unspecified&connectionTimeZone=Asia/Shanghai
    username: postgres
    password: 123456
    hikari:
      minimum-idle: 10
      maximum-pool-size: 50
      idle-timeout: 600000
      max-lifetime: 1800000
      connection-timeout: 30000
      connection-test-query: SELECT 1

  # Redis
  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      timeout: 5000
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 5

  # 文件上传
  servlet:
    multipart:
      enabled: true
      max-file-size: 50MB
      max-request-size: 100MB

  # Jackson
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null

# MyBatis-Plus
mybatis-plus:
  global-config:
    db-config:
      id-type: ASSIGN_ID
      logic-delete-field: deleted_at
      logic-delete-value: now()
      logic-not-delete-value: 'null'
    banner: false
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: false
    call-setters-on-nulls: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  type-aliases-package: com.crm.**.entity
  type-handlers-package: com.crm.framework.mybatis
  mapper-locations: classpath*:mapper/**/*.xml

# JWT
jwt:
  secret: crm-jwt-secret-key-must-be-at-least-256-bits-long-for-hs256
  expire: 7200          # Token 过期时间（秒），默认 2 小时
  refresh-expire: 2592000  # Refresh Token 过期时间（秒），默认 30 天

# 小程序配置
mp:
  jwt:
    secret: mp-jwt-secret-key-must-be-at-least-256-bits-long-for-hs256
    expire: 2592000       # 小程序 Token 过期时间（秒），默认 30 天
  wechat:
    appid: wx               # 微信小程序 AppID
    secret: secret           # 微信小程序 Secret

# SiliconFlow AI 配置
siliconflow:
  api-key: xxxxxxxxxxxx  # 替换为实际 API Key
  base-url: https://api.siliconflow.cn/v1
  model: deepseek-ai/DeepSeek-V4-Flash
  temperature: 0.7
  max-tokens: 4096

# Knife4j
springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true

knife4j:
  enable: true
  setting:
    language: zh-CN

# 日志
logging:
  level:
    com.crm: debug
    org.springframework.security: warn

# 文件存储
crm:
  storage:
    type: local          # local | minio
    local-path: ./uploads
    # minio:
    #   endpoint: http://localhost:9000
