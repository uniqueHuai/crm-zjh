# ============================================================================
# CRM 系统 - 主配置
# ============================================================================

server:
  port: 8080
  servlet:
    context-path: /
  undertow:
    threads:
      io: 4
      worker: 32
    buffer-size: 1024
    direct-buffers: true

spring:
  application:
    name: crm

  profiles:
    active: dev

  # 数据源
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/crm_db?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: postgres
    password: postgres
    hikari:
      minimum-idle: 10
      maximum-pool-size: 50
      idle-timeout: 600000
      max-lifetime: 1800000
      connection-timeout: 30000
      connection-test-query: SELECT 1

  # Redis
  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      timeout: 5000
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 5

  # 文件上传
  servlet:
    multipart:
      enabled: true
      max-file-size: 50MB
      max-request-size: 100MB

  # Jackson
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null

# MyBatis-Plus
mybatis-plus:
  global-config:
    db-config:
      id-type: ASSIGN_ID
      logic-delete-field: deleted_at
      logic-delete-value: now()
      logic-not-delete-value: 'null'
    banner: false
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: false
    call-setters-on-nulls: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  type-aliases-package: com.crm.**.entity
  mapper-locations: classpath*:mapper/**/*.xml

# JWT
jwt:
  secret: crm-jwt-secret-key-must-be-at-least-256-bits-long-for-hs256
  expire: 7200          # Token 过期时间（秒），默认 2 小时
  refresh-expire: 2592000  # Refresh Token 过期时间（秒），默认 30 天

# Knife4j
springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true

knife4j:
  enable: true
  setting:
    language: zh-CN

# 日志
logging:
  level:
    com.crm: debug
    org.springframework.security: warn
