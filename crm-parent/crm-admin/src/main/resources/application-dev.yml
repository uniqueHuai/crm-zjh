spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/crm_db?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&stringtype=unspecified
    username: postgres
    password: postgres

  data:
    redis:
      host: localhost
      port: 6379
      database: 0

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

logging:
  level:
    com.crm: debug
    com.baomidou: debug
